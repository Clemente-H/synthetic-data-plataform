# Model Configuration for Ollama
# Switch between gpt-oss:120b and gpt-oss:20b easily

default_model: "gpt-oss:120b"  # Use 20b if you want lighter load
ollama_url: "http://localhost:11434"
temperature: 0.7
max_tokens: 8192   # up to ~8k tokens per reply (safe on 1× H100)

# Specialized models for different tasks
models:
  concept_extraction:
    model: "gpt-oss:20b"       # lighter + faster for quick tasks
    temperature: 0.3
    max_tokens: 4096
  
  characterization:
    model: "gpt-oss:120b"      # heavier, better quality
    temperature: 0.5
    max_tokens: 6000
  
  generation:
    model: "gpt-oss:120b"
    temperature: 0.7
    max_tokens: 8192   # long creative outputs

# Backup models if primary unavailable
fallback_models:
  - "gpt-oss:20b"
