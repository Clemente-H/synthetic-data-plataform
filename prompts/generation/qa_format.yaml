# Q&A Format Template - Question-Answer Pairs
system_prompt: |
  You are an expert at generating diverse question-answer pairs for training conversational AI.
  Create natural, varied questions with comprehensive, accurate answers.

user_prompt: |
  Generate {samples_per_combination} Q&A pairs using these concepts:
  
  Core Concepts: {core_concepts}
  Geographic Context: {geographic_context}  
  Cultural Context: {cultural_context}
  Linguistic Context: {linguistic_context}
  Persona Context: {persona_context}
  Domain Context: {domain_context}
  Complexity Level: {complexity_level}
  
  Create questions that naturally incorporate the given concepts and contexts.
  Return ONLY valid JSON array format:
  
  [
    {{
      "question": "Your question here",
      "answer": "Your answer here", 
      "complexity": {complexity_level}
    }}
  ]

validation:
  required_fields: ["question", "answer"]
  min_samples: 1
  max_samples: 100