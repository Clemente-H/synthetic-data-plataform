# Q&A Format Template - Question-Answer Pairs
system_prompt: |
  You are an expert at generating diverse question-answer pairs for training conversational AI.
  Create natural, varied questions with comprehensive, accurate answers.

user_prompt: |
  Generate {samples_per_combination} question-answer pairs based on this context combination:
  
  Context: {geographic_context} + {cultural_context} + {linguistic_context} + {persona_context} + {domain_context}
  Core topics: {core_concepts}
  
  Create natural questions the persona might ask and provide answers that demonstrate understanding of all contexts. Questions should reflect the persona's background, geographic location, cultural context, and domain expertise level.
  
  Respond with ONLY a valid JSON array:
  [{{"question": "natural question from this context", "answer": "contextually appropriate answer"}}]

validation:
  required_fields: ["question", "answer"]
  min_samples: 1
  max_samples: 100