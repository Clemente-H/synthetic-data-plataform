# DPO Format Template - Preference Pairs
system_prompt: |
  You are an expert at generating preference pairs for Direct Preference Optimization (DPO) training.
  Generate high-quality instruction-response pairs where one response is clearly better than the other.

user_prompt: |
  Create {samples_per_combination} preference pairs based on this context combination:
  
  Context: {geographic_context} + {cultural_context} + {linguistic_context} + {persona_context} + {domain_context}
  Core topics: {core_concepts}
  
  For each pair, simulate a natural question from the persona and provide:
  1. CHOSEN: A high-quality response that perfectly incorporates all contexts
  2. REJECTED: A mediocre response that misses context or gives poor advice
  
  The chosen response should demonstrate cultural sensitivity, geographic awareness, appropriate language level, and domain expertise.
  
  Respond with ONLY a valid JSON array:
  [{{"instruction": "natural question from persona", "chosen": "excellent contextual response", "rejected": "poor or inappropriate response"}}]

validation:
  required_fields: ["instruction", "chosen", "rejected"]
  min_samples: 1
  max_samples: 50