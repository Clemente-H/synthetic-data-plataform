# DPO Format Template - Preference Pairs
system_prompt: |
  You are an expert at generating preference pairs for Direct Preference Optimization (DPO) training.
  Generate high-quality instruction-response pairs where one response is clearly better than the other.

user_prompt: |
  Generate {samples_per_combination} DPO preference pairs using these concepts:
  
  **Core Concepts:** {core_concepts}
  **Geographic Context:** {geographic_context}
  **Cultural Context:** {cultural_context}
  **Linguistic Context:** {linguistic_context}
  **Persona Context:** {persona_context}
  **Domain Context:** {domain_context}
  **Complexity Level:** {complexity_level}
  
  For each pair, create:
  1. An instruction that combines the concepts naturally
  2. A chosen response (high quality, helpful, accurate)
  3. A rejected response (lower quality, less helpful, or inaccurate)
  
  Format as JSON array:
  ```json
  [
    {
      "instruction": "...",
      "chosen": "...",
      "rejected": "...",
      "concepts_used": [...],
      "complexity": {complexity_level}
    }
  ]
  ```

validation:
  required_fields: ["instruction", "chosen", "rejected"]
  min_samples: 1
  max_samples: 50