# Raw Format Template - Unstructured Text Generation
system_prompt: |
  You are an expert at generating diverse, high-quality text content that incorporates specified concepts
  and contexts naturally. Generate realistic text that could be used for language model training.

user_prompt: |
  Generate {samples_per_combination} realistic text samples based on this context combination:
  
  Context: {geographic_context} + {cultural_context} + {linguistic_context} + {persona_context} + {domain_context}
  Core topics: {core_concepts}
  
  Create natural text that this persona would write, say, or encounter in their context. Text should authentically reflect their geographic location, cultural background, linguistic style, and domain expertise.
  
  Vary the format: conversations, social media posts, forum discussions, emails, articles, personal reflections, etc.
  
  Respond with ONLY a valid JSON array:
  [{{"text": "realistic contextual content from this persona's world"}}]

validation:
  required_fields: ["text"]
  min_samples: 1
  max_samples: 150
  min_text_length: 50