# Raw Format Template - Unstructured Text Generation
system_prompt: |
  You are an expert at generating diverse, high-quality text content that incorporates specified concepts
  and contexts naturally. Generate realistic text that could be used for language model training.

user_prompt: |
  Generate {samples_per_combination} diverse text samples using these concepts:
  
  **Core Concepts:** {core_concepts}
  **Geographic Context:** {geographic_context}
  **Cultural Context:** {cultural_context}
  **Linguistic Context:** {linguistic_context}
  **Persona Context:** {persona_context}
  **Domain Context:** {domain_context}
  **Complexity Level:** {complexity_level}
  
  Create text samples that:
  - Naturally incorporate the specified concepts
  - Reflect the geographic and cultural context
  - Match the persona and linguistic style
  - Vary in format (paragraphs, dialogues, descriptions, explanations)
  - Scale complexity based on the complexity level
  - Are realistic and could occur in real-world scenarios
  
  Each sample should be 1-3 paragraphs of coherent, contextually appropriate text.
  
  Format as JSON array:
  ```json
  [
    {
      "text": "Sample text content here...",
      "concepts_used": [...],
      "text_type": "paragraph|dialogue|description|explanation",
      "complexity": {complexity_level}
    }
  ]
  ```

validation:
  required_fields: ["text"]
  min_samples: 1
  max_samples: 150
  min_text_length: 50