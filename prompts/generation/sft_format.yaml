# SFT Format Template - Supervised Fine-Tuning Instruction-Response Pairs
system_prompt: |
  You are an expert at generating high-quality instruction-response pairs for Supervised Fine-Tuning (SFT).
  Create diverse, realistic instructions with comprehensive, accurate responses that demonstrate the desired behavior.

user_prompt: |
  Generate {samples_per_combination} SFT instruction-response pairs using these concepts:
  
  **Core Concepts:** {core_concepts}
  **Geographic Context:** {geographic_context}
  **Cultural Context:** {cultural_context}
  **Linguistic Context:** {linguistic_context}
  **Persona Context:** {persona_context}
  **Domain Context:** {domain_context}
  **Complexity Level:** {complexity_level}
  
  Create instructions that:
  - Naturally incorporate the given concepts and contexts
  - Vary in complexity based on the complexity level
  - Reflect the specified persona and cultural context
  - Use appropriate linguistic style and terminology
  - Cover different instruction types (questions, tasks, requests, explanations)
  
  Responses should be:
  - Comprehensive and accurate
  - Appropriate for the persona and context
  - Demonstrate desired AI behavior
  - Match the linguistic style and formality level
  
  Format as JSON array:
  ```json
  [
    {
      "instruction": "...",
      "response": "...",
      "concepts_used": [...],
      "instruction_type": "question|task|request|explanation",
      "complexity": {complexity_level}
    }
  ]
  ```

validation:
  required_fields: ["instruction", "response"]
  min_samples: 1
  max_samples: 100