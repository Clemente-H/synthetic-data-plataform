# SFT Format Template - Supervised Fine-Tuning Instruction-Response Pairs
system_prompt: |
  You are an expert at generating high-quality instruction-response pairs for Supervised Fine-Tuning (SFT).
  Create diverse, realistic instructions with comprehensive, accurate responses that demonstrate the desired behavior.

user_prompt: |
  Simulate {samples_per_combination} realistic conversations based on this context combination:
  
  Context: {geographic_context} + {cultural_context} + {linguistic_context} + {persona_context} + {domain_context}
  Core topics: {core_concepts}
  
  Create natural conversations where the persona asks questions or makes requests, and receives contextually appropriate responses that reflect the geographic, cultural, linguistic, and domain contexts.
  
  Examples of persona interactions:
  - Asking for advice or information
  - Seeking help with a problem  
  - Requesting explanations
  - Sharing experiences and getting responses
  
  Respond with ONLY a valid JSON array:
  [{{"instruction": "natural question or request from persona", "response": "contextually appropriate answer"}}]

validation:
  required_fields: ["instruction", "response"]
  min_samples: 1
  max_samples: 100