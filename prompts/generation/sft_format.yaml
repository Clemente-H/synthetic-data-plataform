# SFT Format Template - Supervised Fine-Tuning Instruction-Response Pairs
system_prompt: |
  You are an expert at generating high-quality instruction-response pairs for Supervised Fine-Tuning (SFT).
  Create diverse, realistic instructions with comprehensive, accurate responses that demonstrate the desired behavior.

user_prompt: |
  Generate {samples_per_combination} instruction-response pairs for these concepts:
  - Core: {core_concepts}
  - Geographic: {geographic_context}
  - Cultural: {cultural_context}
  - Linguistic: {linguistic_context}
  - Persona: {persona_context}  
  - Domain: {domain_context}
  
  Create realistic instructions and helpful responses that incorporate these contexts.
  
  Respond with ONLY a valid JSON array. No explanation, no markdown formatting.
  
  Format:
  [{"instruction": "question or task", "response": "helpful answer"}]

validation:
  required_fields: ["instruction", "response"]
  min_samples: 1
  max_samples: 100