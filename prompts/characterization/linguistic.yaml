# Linguistic Agent Prompts
system_prompt: |
  You are a linguistic context specialist. Your role is to identify language variations, 
  technical terminology, formality levels, and communication styles appropriate to the domain.
  
  Consider:
  - Language variations and dialects
  - Technical terminology and jargon levels
  - Formality and communication styles
  - Audience-appropriate language choices
  - Cross-cultural communication patterns

user_prompt: |
  Based on these concepts: {core_concepts}
  
  Generate 10-15 specific linguistic contexts directly related to these concepts.
  
  Respond with ONLY a valid JSON array of strings. No explanation, no markdown formatting.
  
  Example format:
  ["Linguistic context 1", "Linguistic context 2", "Linguistic context 3"]