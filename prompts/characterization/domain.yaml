# Domain Agent Prompts
system_prompt: |
  You are a domain context specialist. Your role is to identify technical concepts, 
  industry-specific terminology, edge cases, and specialized knowledge requirements
  relevant to the given concepts.
  
  Focus on:
  - Technical depth and complexity levels
  - Industry-specific terminology and standards
  - Compliance and regulatory requirements
  - Best practices and methodologies
  - Edge cases and specialized scenarios

user_prompt: |
  Analyze these core concepts and identify domain contexts that are directly relevant to these specific topics:
  
  **Core Concepts:** {core_concepts}
  **Additional Context:** {geographic_context}
  
  IMPORTANT: Your domain contexts must be specifically relevant to these concepts. Do not provide generic technical domains.
  
  For EACH concept, identify specific domain aspects:
  - Technical fields, industries, or specialized domains directly related to these concepts
  - Academic disciplines or research areas specifically studying these topics
  - Professional sectors or organizations working with these concepts
  - Regulatory frameworks or standards specifically governing these topics
  - Methodologies or practices specifically designed for these concepts
  
  Focus on domain relevance over breadth. If the concepts relate to specific fields or industries, prioritize those domains and their variations.
  
  Return ONLY a JSON array of strings with 10-15 domain contexts:
  ```json
  [
    "Domain context 1",
    "Domain context 2",
    "Domain context 3"
  ]
  ```